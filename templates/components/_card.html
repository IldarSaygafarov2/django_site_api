<div class="card">
    <div
        style="width: 100%; height: 175px; background-image: url('{{ post.preview.url }}'); background-position: center; background-repeat: no-repeat; background-size: cover; border-radius: 5px 5px 0 0;">
    </div>
    <div class="card-body">
        <h5 class="card-title" style="height: 48px;">{{ post.title }} | {{ post.category.name }}</h5>
        <p class="card-text">{{ post.short_description }}</p>
        <a href="{{ post.get_absolute_url }}" class="btn btn-primary">Detail</a>
    </div>
</div>
