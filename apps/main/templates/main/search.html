{% extends 'base.html' %}

{% block title %}
Страница поиска
{% endblock %}

{% block content %}
<div class="container mt-5">
    {% for post in posts %}
    <div class="card mb-3">
        <h5 class="card-header">{{ post.created_at }}</h5>
        <div class="card-body">
            <h5 class="card-title">{{ post.title }}</h5>
            <p class="card-text">{{ post.short_description }}</p>
            <a href="{{ post.get_absolute_url }}" class="btn btn-primary">Detail</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
