{% extends 'base.html' %}

{% block title %}
Registration
{% endblock %}

{% block extra_css %}
<style>
    html, body, .container {
        height: 100%
    }

</style>
{% endblock %}

{% block content %}
<div class="container d-flex align-items-center">
    <div class="row justify-content-center flex-grow-1">
        <div class="col-6">
            <form action="" method="post" enctype="multipart/form-data">
                {% csrf_token %}

                {{ form.as_p }}

                <p>
                    <label for="user-profile-image">Profile image</label>
                    <input type="file" class="form-control" id="user-profile-image" name="profile_image">
                </p>

                <button class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
