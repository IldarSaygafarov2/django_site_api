{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block extra_css %}
<style>
    html, body, .container {
        height: 100%
    }

</style>
{% endblock %}

{% block content %}
<div class="container d-flex align-items-center">
    <div class="row justify-content-center flex-grow-1">
        <div class="col-6">
            <form action="" method="post">
                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
